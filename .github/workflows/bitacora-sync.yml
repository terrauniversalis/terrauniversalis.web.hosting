name: Sync Bitacora from SharePoint

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Pull from Graph and build JSON
        env:
          AZURE_TENANT_ID:     ${{ secrets.TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          BITACORA_SITE_ID:    ${{ secrets.SITE_ID }}
          BITACORA_LIST_ID:    ${{ secrets.LIST_ID }}
          BITACORA_OUT_DIR:    .
        run: node scripts/pull-bitacora.mjs

      - name: Debug generated file
        run: |
          pwd
          ls -la
          test -f bitacora.json && echo "bitacora.json exists" || echo "bitacora.json missing"
          if [ -f bitacora.json ]; then
            wc -c bitacora.json
            head -n 20 bitacora.json
          fi

      - name: Commit JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git add bitacora.json
          git status
          git commit -m "chore: update bitacora feed" || echo "no changes"
          git push
